<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rytíř Čísel</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body {
    font-family:"Baloo 2","Comic Sans MS","Segoe UI Rounded","Segoe UI",sans-serif;
    background:linear-gradient(180deg,#7ec8f7 0%,#b3e0ff 45%,#c9f0c0 100%);
    color:#2b3a55;
    user-select:none; -webkit-user-select:none;
    touch-action:manipulation;
    overflow-x:hidden;
  }
  .screen { display:none; min-height:100vh; padding:16px; max-width:900px; margin:0 auto; }
  .screen.active { display:flex; flex-direction:column; align-items:center; animation:fadeIn .35s ease; }
  @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

  /* ---------- title screen ---------- */
  #screen-title { justify-content:center; text-align:center; gap:20px; }
  #screen-title h1 {
    font-size:clamp(42px,9vw,76px); color:#fff; font-weight:800;
    text-shadow:0 4px 0 #4a6fa5, 0 8px 16px rgba(0,0,0,.25);
    letter-spacing:2px;
  }
  .hero { display:flex; align-items:flex-end; gap:clamp(24px,9vw,90px); }
  .hero > div { filter:drop-shadow(0 8px 10px rgba(0,0,0,.25)); }
  #hero-knight { width:clamp(100px,24vw,150px); animation:bob 2.4s ease-in-out infinite; }
  #hero-dragon { width:clamp(120px,28vw,185px); animation:hover 3s ease-in-out infinite; }
  #hero-knight svg, #hero-dragon svg { width:100%; height:auto; display:block; }
  @keyframes bob { 50% { transform:translateY(-6px); } }
  @keyframes hover { 50% { transform:translateY(-13px); } }
  .big-btn {
    font-family:inherit; font-size:clamp(24px,5vw,34px); font-weight:bold;
    padding:14px 60px; border:none; border-radius:40px; cursor:pointer;
    background:linear-gradient(180deg,#ffd94d,#ffb300); color:#7a4a00;
    box-shadow:0 6px 0 #cc8f00, 0 10px 20px rgba(0,0,0,.2);
    transition:transform .1s;
  }
  .big-btn:active { transform:translateY(4px); box-shadow:0 2px 0 #cc8f00; }
  .reset-link { margin-top:24px; font-size:14px; color:#5a7ba6; text-decoration:underline; cursor:pointer; background:none; border:none; font-family:inherit; }

  /* ---------- map screen ---------- */
  #screen-map h2 { font-size:clamp(26px,6vw,40px); color:#fff; font-weight:800; text-shadow:0 3px 0 #4a6fa5; margin:4px 0; }
  .gem-total { font-size:19px; background:rgba(255,255,255,.75); padding:4px 18px; border-radius:20px; margin-bottom:14px; font-weight:bold; }
  .map-wrap {
    position:relative; width:100%; max-width:860px;
    height:clamp(360px,60vw,530px);
    border-radius:24px; overflow:hidden; border:4px solid #fff;
    box-shadow:0 10px 24px rgba(0,0,0,.2);
  }
  .map-bg { position:absolute; inset:0; width:100%; height:100%; }
  .map-node {
    position:absolute; transform:translate(-50%,-50%);
    width:clamp(118px,19vw,172px);
    background:rgba(255,255,250,.92); border:3px solid #fff; border-radius:18px;
    padding:8px 6px; text-align:center; cursor:pointer;
    box-shadow:0 6px 0 rgba(74,111,165,.3), 0 10px 18px rgba(0,0,0,.15);
    transition:transform .12s;
  }
  .map-node:active { transform:translate(-50%,-50%) scale(.95); }
  .map-node .node-icon svg { width:clamp(50px,9vw,74px); height:auto; }
  .map-node h3 { font-size:clamp(13px,2.5vw,18px); margin:0; line-height:1.15; }
  .map-node .medals { font-size:clamp(14px,2.4vw,18px); min-height:22px; }
  .map-node .lvl { font-size:clamp(10px,2vw,13px); color:#7a8bab; line-height:1.2; }
  .map-node.locked { filter:grayscale(1); opacity:.8; }

  /* ---------- game screen ---------- */
  #screen-game { gap:10px; }
  .game-top { display:flex; align-items:center; justify-content:space-between; width:100%; gap:10px; flex-wrap:wrap; }
  .icon-btn {
    font-family:inherit; font-size:19px; font-weight:bold; border:none; cursor:pointer;
    background:#fffef5; color:#2b3a55; border-radius:18px; padding:8px 18px;
    box-shadow:0 4px 0 rgba(74,111,165,.35);
  }
  .icon-btn:active { transform:translateY(3px); box-shadow:0 1px 0 rgba(74,111,165,.35); }
  #game-title { font-size:clamp(20px,5vw,30px); color:#fff; font-weight:800; text-shadow:0 2px 0 #4a6fa5; }
  #lvl-badge { font-size:15px; background:#e8d5ff; color:#5b2d91; padding:5px 14px; border-radius:16px; font-weight:bold; }

  .gem-bar { display:flex; gap:10px; align-items:center; margin:0; flex-wrap:wrap; justify-content:center; }
  .hud-chip { font-size:18px; font-weight:bold; background:rgba(255,255,255,.8); padding:3px 14px; border-radius:16px; }
  @keyframes pop { 0%{transform:scale(0);} 70%{transform:scale(1.4);} 100%{transform:scale(1);} }

  /* ---------- journey scene ---------- */
  .scene {
    position:relative; width:100%; max-width:660px; height:150px;
    border-radius:18px; overflow:hidden; border:3px solid #fff;
    box-shadow:0 6px 14px rgba(0,0,0,.15);
  }
  .scene-bg { position:absolute; inset:0; width:100%; height:100%; }
  .cloud {
    position:absolute; left:0; width:56px; height:15px; background:#fff; border-radius:10px; opacity:.85;
    animation:drift linear infinite;
  }
  .cloud::after { content:''; position:absolute; left:13px; top:-9px; width:26px; height:18px; background:#fff; border-radius:50%; }
  @keyframes drift { from{transform:translateX(-90px);} to{transform:translateX(760px);} }
  .stone { position:absolute; width:26px; height:13px; border-radius:50%;
    background:rgba(90,70,40,.35); transform:translateX(-50%); }
  .stone.reached { background:#ffd94d; box-shadow:0 0 6px 2px rgba(255,217,77,.7); }
  .knight { position:absolute; width:52px; height:58px; z-index:5;
    transition:left .7s ease, bottom .7s ease;
    transform:translateX(-50%);
    filter:drop-shadow(0 3px 3px rgba(0,0,0,.3));
    animation:kbob 2.4s ease-in-out infinite; }
  .knight svg { width:100%; height:100%; display:block; }
  @keyframes kbob { 0%,100%{transform:translateX(-50%) translateY(0);} 50%{transform:translateX(-50%) translateY(-4px);} }
  .knight.hop { animation:hop .7s ease; }
  @keyframes hop { 0%,100%{transform:translateX(-50%) translateY(0);} 50%{transform:translateX(-50%) translateY(-26px);} }
  .obstacle { position:absolute; width:48px; height:48px; z-index:4;
    transform:translateX(-50%); transition:transform .7s ease, opacity .7s ease;
    filter:drop-shadow(0 3px 3px rgba(0,0,0,.25)); }
  .obstacle svg { width:100%; height:100%; display:block; }
  .obstacle.flee { transform:translateX(-50%) translateY(-90px) rotate(300deg); opacity:0; }
  .goal { position:absolute; width:42px; z-index:3; animation:gpulse 1.6s infinite; }
  .goal svg { width:100%; height:auto; display:block; }
  @keyframes gpulse { 0%,100%{transform:translateX(-50%) scale(1);} 50%{transform:translateX(-50%) scale(1.08);} }

  .instruction {
    background:rgba(255,255,255,.85); border-radius:18px; padding:8px 16px;
    font-size:clamp(15px,3.6vw,19px); text-align:center; max-width:660px;
    display:flex; align-items:center; gap:10px;
  }
  .speak-btn { border:none; background:#dff0ff; border-radius:50%; width:44px; height:44px; font-size:22px; cursor:pointer; flex-shrink:0; box-shadow:0 3px 0 #9cc4e4; }
  .speak-btn:active { transform:translateY(2px); box-shadow:0 1px 0 #9cc4e4; }

  #task-area { display:flex; flex-direction:column; align-items:center; gap:6px; margin:10px 0 4px; min-height:190px; justify-content:center; width:100%; }

  /* pyramid */
  .pyr-row { display:flex; gap:6px; justify-content:center; }
  .brick {
    width:min(88px,19vw); height:min(58px,13vw);
    display:flex; align-items:center; justify-content:center;
    font-size:clamp(20px,5vw,30px); font-weight:bold; color:#5c3a10;
    background:linear-gradient(180deg,#ffe1a8,#f0b860);
    border:3px solid #c98f3d; border-radius:12px;
    box-shadow:inset 0 -6px 0 rgba(0,0,0,.08);
  }
  .brick.missing {
    background:#fff; color:#e2544a; border:3px dashed #e2544a;
    animation:pulse 1.2s infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.07);} }

  /* snake */
  .snake { display:flex; align-items:center; flex-wrap:wrap; justify-content:center; gap:4px; row-gap:14px; }
  .snake .seg {
    width:min(68px,15vw); height:min(68px,15vw); border-radius:50%;
    background:linear-gradient(180deg,#b6e388,#7cc24e); border:3px solid #4e8a26;
    display:flex; align-items:center; justify-content:center;
    font-size:clamp(20px,5vw,28px); font-weight:bold; color:#274d10;
    box-shadow:inset 0 -5px 0 rgba(0,0,0,.1);
  }
  .snake .seg.head { background:linear-gradient(180deg,#8fd463,#59a82f); }
  .snake .seg.missing { background:#fff; color:#e2544a; border:3px dashed #e2544a; animation:pulse 1.2s infinite; }
  .snake .op {
    font-size:clamp(16px,4vw,22px); font-weight:bold; color:#2b3a55;
    background:#fffef5; border-radius:14px; padding:4px 10px; margin:0 2px;
    box-shadow:0 3px 0 rgba(74,111,165,.3);
  }
  .snake .arrow { font-size:18px; color:#4e8a26; }
  .snake-emoji { font-size:34px; margin-right:2px; }

  /* choices */
  .choices { display:flex; gap:16px; justify-content:center; margin-top:10px; flex-wrap:wrap; }
  .choice {
    font-family:inherit; font-size:clamp(26px,6vw,36px); font-weight:bold;
    width:min(110px,26vw); height:min(80px,19vw);
    border:none; border-radius:22px; cursor:pointer;
    background:linear-gradient(180deg,#9ad8ff,#4aa8e8); color:#083b63;
    box-shadow:0 6px 0 #2f7fb5, 0 10px 16px rgba(0,0,0,.15);
    transition:transform .1s;
  }
  .choice:active { transform:translateY(4px); box-shadow:0 2px 0 #2f7fb5; }
  .choice.wrong { background:#d9d9d9; color:#999; box-shadow:0 6px 0 #b5b5b5; animation:shake .4s; pointer-events:none; }
  .choice.hintglow { animation:glow 1s infinite; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);} }
  @keyframes glow { 0%,100%{box-shadow:0 6px 0 #2f7fb5,0 0 6px 3px #ffd94d;} 50%{box-shadow:0 6px 0 #2f7fb5,0 0 20px 10px #ffd94d;} }

  /* toast */
  #toast {
    position:fixed; top:38%; left:50%; transform:translate(-50%,-50%) scale(0);
    font-size:clamp(34px,8vw,56px); font-weight:800; color:#fff;
    text-shadow:0 3px 0 #3f9e3f, 0 6px 14px rgba(0,0,0,.3);
    pointer-events:none; z-index:50; white-space:nowrap;
  }
  #toast.show { animation:toastIn .9s ease; }
  @keyframes toastIn { 0%{transform:translate(-50%,-50%) scale(0);} 30%{transform:translate(-50%,-50%) scale(1.15);} 60%{transform:translate(-50%,-50%) scale(1);} 100%{transform:translate(-50%,-70%) scale(1); opacity:0;} }

  .fly-gem { position:fixed; z-index:60; font-size:30px; pointer-events:none;
    transform:translate(-50%,-50%); transition:left .7s ease-in, top .7s ease-in, opacity .7s, font-size .7s; }

  /* overlay (story / medal / final) */
  #overlay {
    position:fixed; inset:0; background:rgba(30,45,80,.55); z-index:100;
    display:none; align-items:center; justify-content:center; padding:20px;
  }
  #overlay.show { display:flex; }
  .panel {
    background:#fffef5; border-radius:28px; padding:28px 26px; max-width:480px;
    text-align:center; box-shadow:0 16px 40px rgba(0,0,0,.35);
    animation:panelIn .35s ease;
  }
  @keyframes panelIn { from{transform:scale(.7); opacity:0;} to{transform:scale(1); opacity:1;} }
  .panel .big-emoji { font-size:66px; }
  .panel h3 { font-size:26px; margin:8px 0; }
  .panel p { font-size:18px; line-height:1.45; margin-bottom:16px; }

  .confetti-piece { position:fixed; top:-40px; font-size:26px; z-index:99; animation:fall linear forwards; pointer-events:none; }
  @keyframes fall { to { transform:translateY(110vh) rotate(720deg); } }

  /* dragon wing flap */
  .wing { transform-origin:60px 40px; animation:flap 1.6s ease-in-out infinite; }
  @keyframes flap { 50% { transform:rotate(-14deg); } }
</style>
</head>
<body>

<!-- ============ TITLE ============ -->
<div id="screen-title" class="screen active">
  <h1>Rytíř Čísel</h1>
  <div class="hero">
    <div id="hero-knight"></div>
    <div id="hero-dragon"></div>
  </div>
  <button class="big-btn" onclick="startGame()">Hrát</button>
  <button class="reset-link" onclick="resetProgress()">Smazat postup</button>
</div>

<!-- ============ MAP ============ -->
<div id="screen-map" class="screen">
  <h2>Mapa království</h2>
  <div class="gem-total">💎 <span id="total-gems">0</span> drahokamů</div>
  <div class="map-wrap">
    <svg class="map-bg" viewBox="0 0 900 560" preserveAspectRatio="none">
      <defs>
        <linearGradient id="skyM" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#8ecdf9"/><stop offset="1" stop-color="#d9efff"/>
        </linearGradient>
      </defs>
      <rect width="900" height="560" fill="url(#skyM)"/>
      <circle cx="80" cy="64" r="30" fill="#ffd94d"/>
      <ellipse cx="690" cy="66" rx="48" ry="16" fill="#ffffff" opacity=".85"/>
      <ellipse cx="300" cy="46" rx="42" ry="14" fill="#ffffff" opacity=".75"/>
      <ellipse cx="180" cy="600" rx="540" ry="360" fill="#a8d68a"/>
      <ellipse cx="780" cy="640" rx="580" ry="410" fill="#94c877"/>
      <path d="M144 424 C 250 405 320 305 441 262 C 560 220 650 155 745 112"
            stroke="#dcbc7e" stroke-width="34" fill="none" stroke-linecap="round"/>
      <path d="M144 424 C 250 405 320 305 441 262 C 560 220 650 155 745 112"
            stroke="#fff" stroke-width="4" fill="none" stroke-dasharray="16 14" opacity=".7"/>
      <g fill="#3e8e41">
        <path d="M700 372 l16 30 h-32 Z"/><path d="M700 392 l20 34 h-40 Z"/>
        <path d="M240 190 l13 25 h-26 Z"/><path d="M240 206 l16 28 h-32 Z"/>
        <path d="M560 420 l14 26 h-28 Z"/><path d="M560 436 l17 30 h-34 Z"/>
      </g>
      <rect x="696" y="424" width="8" height="12" fill="#8a5a2b"/>
      <rect x="236" y="232" width="7" height="10" fill="#8a5a2b"/>
      <rect x="556" y="464" width="8" height="11" fill="#8a5a2b"/>
      <ellipse cx="420" cy="480" rx="34" ry="12" fill="#8cc06a"/>
      <ellipse cx="120" cy="250" rx="30" ry="11" fill="#8cc06a"/>
    </svg>
    <div class="map-node" style="left:16%; top:74%;" onclick="openWorld('pyr')">
      <div class="node-icon"><svg viewBox="0 0 80 60"><polygon points="4,56 30,14 56,56" fill="#8fa8c4"/><polygon points="30,14 20,30 40,30" fill="#fff"/><polygon points="36,56 58,24 78,56" fill="#7d97b8"/><polygon points="58,24 51,36 65,36" fill="#fff"/><rect x="29" y="2" width="2.5" height="14" fill="#8a5a2b"/><path d="M31.5 2 h12 l-4 4 4 4 h-12 Z" fill="#e2544a"/></svg></div>
      <h3>Pyramidová hora</h3>
      <div class="medals" id="medals-pyr"></div>
      <div class="lvl" id="map-lvl-pyr"></div>
    </div>
    <div class="map-node" style="left:49%; top:46%;" onclick="openWorld('had')">
      <div class="node-icon"><svg viewBox="0 0 80 60"><g transform="translate(24,8)"><rect x="-3" width="6" height="44" rx="3" fill="#8a5a2b"/><ellipse rx="18" ry="6" transform="rotate(-28)" fill="#3e8e41"/><ellipse rx="18" ry="6" transform="rotate(28)" fill="#4aa04e"/><ellipse rx="14" ry="5" transform="rotate(88)" fill="#357a38"/></g><path d="M40 52 q8 -10 16 0 q8 10 16 0" stroke="#5fae55" stroke-width="7" fill="none" stroke-linecap="round"/><circle cx="72" cy="49" r="4.5" fill="#5fae55"/><circle cx="73.5" cy="48" r="1.4" fill="#222"/></svg></div>
      <h3>Hadí údolí</h3>
      <div class="medals" id="medals-had"></div>
      <div class="lvl" id="map-lvl-had"></div>
    </div>
    <div class="map-node" id="tower-card" style="left:82%; top:21%;" onclick="openTower()">
      <div class="node-icon"><svg viewBox="0 0 80 72"><rect x="24" y="20" width="32" height="48" rx="4" fill="#9aa3ad"/><rect x="22" y="14" width="8" height="10" fill="#9aa3ad"/><rect x="36" y="14" width="8" height="10" fill="#9aa3ad"/><rect x="50" y="14" width="8" height="10" fill="#9aa3ad"/><rect x="34" y="46" width="12" height="22" rx="6" fill="#4a3a5a"/><rect x="37" y="2" width="2.5" height="14" fill="#8a5a2b"/><path d="M39.5 2 h13 l-4 4 4 4 h-13 Z" fill="#5b2d91"/><circle cx="40" cy="34" r="5" fill="#2b3a55"/><circle cx="40" cy="34" r="3" fill="#7ee0e8"/></svg></div>
      <h3>Dračí věž</h3>
      <div class="medals" id="tower-status">🔒</div>
      <div class="lvl">Získej medaili z obou světů!</div>
    </div>
  </div>
</div>

<!-- ============ GAME ============ -->
<div id="screen-game" class="screen">
  <div class="game-top">
    <button class="icon-btn" onclick="goMap()">🗺️ Mapa</button>
    <div id="game-title"></div>
    <div id="lvl-badge"></div>
  </div>
  <div class="gem-bar" id="gem-bar"></div>
  <div class="scene" id="scene"></div>
  <div class="instruction">
    <button class="speak-btn" onclick="speakInstruction()">🔊</button>
    <span id="instruction-text"></span>
  </div>
  <div id="task-area"></div>
  <div class="choices" id="choices"></div>
</div>

<div id="toast"></div>

<!-- ============ OVERLAY ============ -->
<div id="overlay">
  <div class="panel">
    <div class="big-emoji" id="ov-emoji">🐉</div>
    <h3 id="ov-title"></h3>
    <p id="ov-text"></p>
    <button class="big-btn" style="font-size:22px; padding:10px 40px;" id="ov-btn">Pokračovat</button>
  </div>
</div>

<script>
'use strict';

/* ================= SVG art ================= */
const KNIGHT_SVG = `<svg viewBox="0 0 64 72" xmlns="http://www.w3.org/2000/svg">
<path d="M24 30 Q8 44 15 60 Q26 54 28 42 Z" fill="#c0392b"/>
<rect x="26" y="50" width="7" height="16" rx="3.5" fill="#44546b"/>
<rect x="35" y="50" width="7" height="16" rx="3.5" fill="#44546b"/>
<rect x="24" y="62" width="11" height="7" rx="3.5" fill="#6b4423"/>
<rect x="34" y="62" width="11" height="7" rx="3.5" fill="#6b4423"/>
<rect x="22" y="28" width="24" height="26" rx="9" fill="#5b7fd4"/>
<rect x="22" y="28" width="24" height="11" rx="5.5" fill="#7396e8"/>
<rect x="42" y="32" width="13" height="6" rx="3" fill="#7396e8"/>
<rect x="51" y="8" width="5" height="28" rx="2.5" fill="#dbe4ee"/>
<rect x="46" y="33" width="15" height="5" rx="2.5" fill="#d4a017"/>
<circle cx="53.5" cy="42" r="3.5" fill="#d4a017"/>
<circle cx="21" cy="42" r="9.5" fill="#e2b007"/>
<circle cx="21" cy="42" r="6" fill="#f6d14d"/>
<circle cx="34" cy="18" r="10" fill="#f5c9a0"/>
<path d="M24 18 a10 10 0 0 1 20 0 l0 3 h-4 v-3 h-12 v3 h-4 Z" fill="#9fb2c8"/>
<path d="M34 5 Q28 0 24 4 Q29 6 31 10 Z" fill="#c0392b"/>
<circle cx="38" cy="20" r="1.7" fill="#2b3a55"/>
<path d="M35 24 q3 2.5 6 0" stroke="#c98a6b" stroke-width="1.6" fill="none" stroke-linecap="round"/>
</svg>`;

const DRAGON_SVG = `<svg viewBox="0 0 100 84" xmlns="http://www.w3.org/2000/svg">
<path d="M78 58 q16 2 18 -10 q-10 0 -14 4 Z" fill="#4e9b47"/>
<g class="wing"><path d="M56 34 Q84 8 90 32 Q74 36 62 44 Z" fill="#3c7a36"/></g>
<ellipse cx="52" cy="56" rx="26" ry="20" fill="#59b559"/>
<ellipse cx="46" cy="62" rx="15" ry="11" fill="#bde6a8"/>
<path d="M34 40 l6 -8 6 8 Z" fill="#3c7a36"/>
<path d="M46 36 l6 -8 6 8 Z" fill="#3c7a36"/>
<circle cx="26" cy="30" r="15" fill="#59b559"/>
<ellipse cx="13" cy="35" rx="9" ry="6.5" fill="#6fc46f"/>
<circle cx="10" cy="34" r="1.3" fill="#2b3a55"/>

/* ================= helpers ================= */
function randInt(a,b){ return a + Math.floor(Math.random()*(b-a+1)); }
function pick(arr){ return arr[randInt(0,arr.length-1)]; }
function shuffle(arr){
  for (let i=arr.length-1; i>0; i--){ const j=randInt(0,i); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}
function makeChoices(ans){
  const set = new Set([ans]);
  let guard = 0;
  while (set.size < 3 && guard++ < 100){
    const d = ans + (Math.random()<0.5?-1:1)*randInt(1,3);
    if (d >= 0) set.add(d);
  }
  while (set.size < 3) set.add(ans + set.size);
  return shuffle([...set]);
}

/* ================= audio ================= */
let AC = null;
function ensureAudio(){
  if (!AC) { try { AC = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} }
  if (AC && AC.state === 'suspended') AC.resume();
}
function tone(freq, when, dur, type, vol){
  if (!AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type||'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(vol||0.15, AC.currentTime + when);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + when + dur);
  o.connect(g); g.connect(AC.destination);
  o.start(AC.currentTime + when); o.stop(AC.currentTime + when + dur + 0.05);
}
function playCorrect(){ tone(523,0,.15); tone(659,.13,.15); tone(784,.26,.3); }
function playStep(){ tone(440,0,.08,'triangle',.08); tone(554,.1,.1,'triangle',.08); }
function playFlee(){ tone(880,0,.1); tone(740,.1,.1); tone(587,.2,.1); tone(440,.3,.2); }
function playWrong(){ tone(196,0,.3,'triangle',.12); }
function playClick(){ tone(600,0,.06,'square',.05); }
function playFanfare(){ tone(523,0,.18); tone(659,.15,.18); tone(784,.3,.18); tone(1047,.45,.5); }

/* ================= speech ================= */
function speak(text){
  try {
    if (!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'cs-CZ'; u.rate = 0.92;
    const v = speechSynthesis.getVoices().find(v => v.lang && v.lang.toLowerCase().startsWith('cs'));
    if (v) u.voice = v;
    speechSynthesis.speak(u);
  } catch(e){}
}
if ('speechSynthesis' in window) speechSynthesis.getVoices();

/* ================= task generation ================= */
function genPyramid(level){
  const cfg = [null,
    {base:2, maxB:9, missing:['top']},
    {base:2, maxB:9, missing:['base']},
    {base:3, maxB:6, missing:['top','mid']},
    {base:3, maxB:6, missing:['base','mid']},
    {base:4, maxB:3, missing:['base','mid','top']}
  ][level];
  let base;
  do { base = Array.from({length:cfg.base}, () => randInt(0, cfg.maxB)); }
  while (base.reduce((a,b)=>a+b,0) < 3);
  const rows = [base];
  while (rows[rows.length-1].length > 1){
    const prev = rows[rows.length-1];
    rows.push(prev.slice(1).map((v,i) => v + prev[i]));
  }
  const type = pick(cfg.missing);
  let mr, mi;
  if (type === 'top'){ mr = rows.length-1; mi = 0; }
  else if (type === 'base'){ mr = 0; mi = randInt(0, rows[0].length-1); }
  else { mr = randInt(1, rows.length-2); mi = randInt(0, rows[mr].length-1); }
  const hint = (mr === rows.length-1)
    ? 'Sečti dvě cihly hned pod otazníkem.'
    : 'Otazník a cihla vedle něj dají dohromady cihlu nad nimi.';
  return { kind:'pyr', rows, mr, mi, answer: rows[mr][mi], hint };
}

function genSnake(level){
  const cfg = [null,
    {len:3, max:10, step:5, blank:'last'},
    {len:4, max:10, step:5, blank:'mid'},
    {len:4, max:20, step:7, blank:'midlast'},
    {len:5, max:20, step:7, blank:'any'},
    {len:5, max:20, step:9, blank:'firstmid'}
  ][level];
  const vals = [randInt(0, cfg.max)];
  const ops = [];
  for (let i=1; i<cfg.len; i++){
    let k, sign, next, tries = 0;
    do {
      k = randInt(1, cfg.step);
      sign = Math.random() < 0.5 ? -1 : 1;
      next = vals[i-1] + sign*k;
      tries++;
    } while ((next < 0 || next > cfg.max) && tries < 60);
    if (next < 0 || next > cfg.max){ sign = next < 0 ? 1 : -1; next = vals[i-1] + sign*k; }
    ops.push(sign*k);
    vals.push(next);
  }
  let bi;
  switch (cfg.blank){
    case 'last':     bi = cfg.len-1; break;
    case 'mid':      bi = randInt(1, cfg.len-2); break;
    case 'midlast':  bi = randInt(1, cfg.len-1); break;
    case 'any':      bi = randInt(0, cfg.len-1); break;
    case 'firstmid': bi = Math.random() < 0.4 ? 0 : randInt(1, cfg.len-2); break;
  }
  const hint = bi === 0
    ? 'Počítej pozpátku: udělej opačný krok, než říká první šipka.'
    : 'Vezmi číslo před otazníkem a udělej krok, který říká šipka.';
  return { kind:'had', vals, ops, bi, answer: vals[bi], hint };
}

/* ================= rendering ================= */
function newTask(){
  missesThisTask = 0;
  inputLocked = false;
  currentTask = currentWorld === 'pyr' ? genPyramid(S.level.pyr) : genSnake(S.level.had);
  renderGems();
  renderScene();
  renderTask();
  renderChoices();
}
function renderTask(){
  const area = document.getElementById('task-area');
  area.innerHTML = '';
  const t = currentTask;
  if (t.kind === 'pyr'){
    for (let r = t.rows.length-1; r >= 0; r--){
      const row = document.createElement('div');
      row.className = 'pyr-row';
      t.rows[r].forEach((v,i) => {
        const b = document.createElement('div');
        const isMissing = (r === t.mr && i === t.mi);
        b.className = 'brick' + (isMissing ? ' missing' : '');
        b.textContent = isMissing ? '?' : v;
        row.appendChild(b);
      });
      area.appendChild(row);
    }
  } else {
    const snake = document.createElement('div');
    snake.className = 'snake';
    const head = document.createElement('span');
    head.className = 'snake-emoji';
    head.textContent = '🐍';
    snake.appendChild(head);
    t.vals.forEach((v,i) => {
      const seg = document.createElement('div');
      const isMissing = i === t.bi;
      seg.className = 'seg' + (i === 0 ? ' head' : '') + (isMissing ? ' missing' : '');
      seg.textContent = isMissing ? '?' : v;
      snake.appendChild(seg);
      if (i < t.ops.length){
        const arrow = document.createElement('span');
        arrow.className = 'arrow';
        arrow.textContent = '➜';
        const op = document.createElement('span');
        op.className = 'op';
        op.textContent = (t.ops[i] >= 0 ? '+' : '−') + Math.abs(t.ops[i]);
        snake.appendChild(arrow);
        snake.appendChild(op);
      }
    });
    area.appendChild(snake);
  }
}
function renderChoices(){
  const box = document.getElementById('choices');
  box.innerHTML = '';
  makeChoices(currentTask.answer).forEach(v => {
    const b = document.createElement('button');
    b.className = 'choice';
    b.textContent = v;
    b.onclick = () => answer(b, v);
    box.appendChild(b);
  });
}

/* ================= answering ================= */
const PRAISE = ['Výborně!','Skvěle!','Paráda!','Super!','Přesně tak!','Jsi kouzelník!'];
function answer(btn, val){
  if (inputLocked) return;
  ensureAudio();
  const w = currentWorld;
  if (val === currentTask.answer){
    inputLocked = true;
    playCorrect();
    flyGem();
    toast(pick(PRAISE));
    S.gems[w]++;
    if (missesThisTask >= 2){ S.failStreak[w]++; }
    else if (missesThisTask === 0){
      S.failStreak[w] = 0;
      S.streak[w]++;
      if (S.streak[w] >= 3 && S.level[w] < 5){
        S.level[w]++;
        S.streak[w] = 0;
        setTimeout(() => toast('✨ Nové kouzlo! Úroveň ' + S.level[w]), 1000);
      }
    } else {
      S.failStreak[w] = 0;
      S.streak[w] = 0;
    }
    if (S.failStreak[w] >= 2 && S.level[w] > 1){
      S.level[w]--;
      S.failStreak[w] = 0;
      S.streak[w] = 0;
    }
    saveState();
    renderGems();
    const gotMedal = S.gems[w] % 10 === 0 && Math.floor(S.gems[w]/10) > S.medalsShown[w];
    const newPos = gotMedal ? 10 : S.gems[w] % 10;
    const extraDelay = moveKnight(newPos);
    setTimeout(() => {
      if (gotMedal){
        S.medalsShown[w] = Math.floor(S.gems[w]/10);
        saveState();
        playFanfare(); confetti();
        showPanel('🏅','Medaile!', WORLDS[w].goalStory + ' Drak Chaos se už třese strachy.',
          'Pokračovat', newTask, true);
      } else newTask();
    }, 1300 + extraDelay);
  } else {
    playWrong();
    btn.classList.add('wrong');
    missesThisTask++;
    S.streak[w] = 0;
    if (missesThisTask >= 2){
      document.querySelectorAll('.choice:not(.wrong)').forEach(b => b.classList.add('hintglow'));
      speak(currentTask.hint);
      toast('💡 ' + 'Nápověda!');
    } else {
      toast('Zkus to znovu!');
    }
  }
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('show');
  void t.offsetWidth;
  t.classList.add('show');
}
function flyGem(){
  if (typeof requestAnimationFrame === 'undefined') return;
  const area = document.getElementById('task-area'), bar = document.getElementById('gem-bar');
  if (!area || !bar || !area.getBoundingClientRect) return;
  const a = area.getBoundingClientRect(), b = bar.getBoundingClientRect();
  const g = document.createElement('div');
  g.className = 'fly-gem';
  g.textContent = '💎';
  g.style.left = (a.left + a.width/2) + 'px';
  g.style.top = (a.top + a.height/2) + 'px';
  document.body.appendChild(g);
  requestAnimationFrame(() => requestAnimationFrame(() => {
    g.style.left = (b.left + b.width/2) + 'px';
    g.style.top = (b.top + b.height/2) + 'px';
    g.style.fontSize = '14px';
    g.style.opacity = '.25';
  }));
  setTimeout(() => g.remove(), 800);
}
function confetti(){
  const emojis = ['🎉','⭐','💎','🎊','✨','🏅'];
  for (let i=0; i<36; i++){
    const p = document.createElement('span');
    p.className = 'confetti-piece';
    p.textContent = pick(emojis);
    p.style.left = randInt(2,96) + 'vw';
    p.style.animationDuration = (1.6 + Math.random()*1.6) + 's';
    p.style.animationDelay = (Math.random()*0.8) + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 4200);
  }
}

/* ================= boot ================= */
document.getElementById('hero-knight').innerHTML = KNIGHT_SVG;
document.getElementById('hero-dragon').innerHTML = DRAGON_SVG;
</script>
