<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rytíř Čísel</title>
<meta name="description" content="Matematická dobrodružná hra pro děti v češtině">
<meta name="theme-color" content="#4a6fa5">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Rytíř Čísel">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body {
    font-family:"Baloo 2","Comic Sans MS","Segoe UI Rounded","Segoe UI",sans-serif;
    background:linear-gradient(180deg,#7ec8f7 0%,#b3e0ff 45%,#c9f0c0 100%);
    color:#2b3a55;
    user-select:none; -webkit-user-select:none;
    touch-action:manipulation;
    overflow-x:hidden;
  }
  .screen { display:none; min-height:100vh; padding:16px; max-width:900px; margin:0 auto; }
  .screen.active { display:flex; flex-direction:column; align-items:center; animation:fadeIn .35s ease; }
  @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

  /* ---------- title screen ---------- */
  #screen-title { justify-content:center; text-align:center; gap:20px; }
  #screen-title h1 {
    font-size:clamp(42px,9vw,76px); color:#fff; font-weight:800;
    text-shadow:0 4px 0 #4a6fa5, 0 8px 16px rgba(0,0,0,.25);
    letter-spacing:2px;
  }
  .hero { display:flex; align-items:flex-end; gap:clamp(24px,9vw,90px); }
  .hero > div { filter:drop-shadow(0 8px 10px rgba(0,0,0,.25)); }
  #hero-knight { width:clamp(100px,24vw,150px); animation:bob 2.4s ease-in-out infinite; }
  #hero-dragon { width:clamp(120px,28vw,185px); animation:hover 3s ease-in-out infinite; }
  #hero-knight svg, #hero-dragon svg { width:100%; height:auto; display:block; }
  @keyframes bob { 50% { transform:translateY(-6px); } }
  @keyframes hover { 50% { transform:translateY(-13px); } }
  .big-btn {
    font-family:inherit; font-size:clamp(24px,5vw,34px); font-weight:bold;
    padding:14px 60px; border:none; border-radius:40px; cursor:pointer;
    background:linear-gradient(180deg,#ffd94d,#ffb300); color:#7a4a00;
    box-shadow:0 6px 0 #cc8f00, 0 10px 20px rgba(0,0,0,.2);
    transition:transform .1s;
  }
  .big-btn:active { transform:translateY(4px); box-shadow:0 2px 0 #cc8f00; }
  .reset-link { margin-top:24px; font-size:14px; color:#5a7ba6; text-decoration:underline; cursor:pointer; background:none; border:none; font-family:inherit; }

  /* ---------- map screen ---------- */
  #screen-map h2 { font-size:clamp(26px,6vw,40px); color:#fff; font-weight:800; text-shadow:0 3px 0 #4a6fa5; margin:4px 0; }
  .gem-total { font-size:19px; background:rgba(255,255,255,.75); padding:4px 18px; border-radius:20px; margin-bottom:14px; font-weight:bold; }
  .map-wrap {
    position:relative; width:100%; max-width:860px;
    height:clamp(360px,60vw,530px);
    border-radius:24px; overflow:hidden; border:4px solid #fff;
    box-shadow:0 10px 24px rgba(0,0,0,.2);
  }
  .map-bg { position:absolute; inset:0; width:100%; height:100%; }
  .map-node {
    position:absolute; transform:translate(-50%,-50%);
    width:clamp(118px,19vw,172px);
    background:rgba(255,255,250,.92); border:3px solid #fff; border-radius:18px;
    padding:8px 6px; text-align:center; cursor:pointer;
    box-shadow:0 6px 0 rgba(74,111,165,.3), 0 10px 18px rgba(0,0,0,.15);
    transition:transform .12s;
  }
  .map-node:active { transform:translate(-50%,-50%) scale(.95); }
  .map-node .node-icon svg { width:clamp(50px,9vw,74px); height:auto; }
  .map-node h3 { font-size:clamp(13px,2.5vw,18px); margin:0; line-height:1.15; }
  .map-node .medals { font-size:clamp(14px,2.4vw,18px); min-height:22px; }
  .map-node .lvl { font-size:clamp(10px,2vw,13px); color:#7a8bab; line-height:1.2; }
  .map-node.locked { filter:grayscale(1); opacity:.8; }

  /* ---------- game screen ---------- */
  #screen-game { gap:10px; }
  .game-top { display:flex; align-items:center; justify-content:space-between; width:100%; gap:10px; flex-wrap:wrap; }
  .icon-btn {
    font-family:inherit; font-size:19px; font-weight:bold; border:none; cursor:pointer;
    background:#fffef5; color:#2b3a55; border-radius:18px; padding:8px 18px;
    box-shadow:0 4px 0 rgba(74,111,165,.35);
  }
  .icon-btn:active { transform:translateY(3px); box-shadow:0 1px 0 rgba(74,111,165,.35); }
  #game-title { font-size:clamp(20px,5vw,30px); color:#fff; font-weight:800; text-shadow:0 2px 0 #4a6fa5; }
  #lvl-badge { font-size:15px; background:#e8d5ff; color:#5b2d91; padding:5px 14px; border-radius:16px; font-weight:bold; }

  .gem-bar { display:flex; gap:10px; align-items:center; margin:0; flex-wrap:wrap; justify-content:center; }
  .hud-chip { font-size:18px; font-weight:bold; background:rgba(255,255,255,.8); padding:3px 14px; border-radius:16px; }
  @keyframes pop { 0%{transform:scale(0);} 70%{transform:scale(1.4);} 100%{transform:scale(1);} }

  /* ---------- journey scene ---------- */
  .scene {
    position:relative; width:100%; max-width:660px; height:150px;
    border-radius:18px; overflow:hidden; border:3px solid #fff;
    box-shadow:0 6px 14px rgba(0,0,0,.15);
  }
  .scene-bg { position:absolute; inset:0; width:100%; height:100%; }
  .cloud {
    position:absolute; left:0; width:56px; height:15px; background:#fff; border-radius:10px; opacity:.85;
    animation:drift linear infinite;
  }
  .cloud::after { content:''; position:absolute; left:13px; top:-9px; width:26px; height:18px; background:#fff; border-radius:50%; }
  @keyframes drift { from{transform:translateX(-90px);} to{transform:translateX(760px);} }
  .stone { position:absolute; width:26px; height:13px; border-radius:50%;
    background:rgba(90,70,40,.35); transform:translateX(-50%); }
  .stone.reached { background:#ffd94d; box-shadow:0 0 6px 2px rgba(255,217,77,.7); }
  .knight { position:absolute; width:52px; height:58px; z-index:5;
    transition:left .7s ease, bottom .7s ease;
    transform:translateX(-50%);
    filter:drop-shadow(0 3px 3px rgba(0,0,0,.3));
    animation:kbob 2.4s ease-in-out infinite; }
  .knight svg { width:100%; height:100%; display:block; }
  @keyframes kbob { 0%,100%{transform:translateX(-50%) translateY(0);} 50%{transform:translateX(-50%) translateY(-4px);} }
  .knight.hop { animation:hop .7s ease; }
  @keyframes hop { 0%,100%{transform:translateX(-50%) translateY(0);} 50%{transform:translateX(-50%) translateY(-26px);} }
  .obstacle { position:absolute; width:48px; height:48px; z-index:4;
    transform:translateX(-50%);
    filter:drop-shadow(0 3px 3px rgba(0,0,0,.25)); }
  .obstacle svg { width:100%; height:100%; display:block; }
  /* creature knocked flying by a sword strike */
  .obstacle.knocked { animation:knockout .9s ease-in forwards; z-index:6; }
  @keyframes knockout {
    15% { transform:translateX(-50%) translateY(-12px) rotate(-18deg); }
    100% { transform:translateX(-50%) translate(340px,-70px) rotate(660deg); opacity:0; }
  }
  /* inanimate obstacle shattered by a number-spell */
  .obstacle.blasted { animation:blastout .8s ease forwards; z-index:6; }
  @keyframes blastout {
    25% { transform:translateX(-50%) scale(1.25); filter:brightness(1.9); }
    100% { transform:translateX(-50%) scale(0) rotate(200deg); opacity:0; filter:brightness(3); }
  }
  /* sword slash arc */
  .slash { position:absolute; width:58px; z-index:8; transform:translateX(-50%); pointer-events:none;
    animation:slashpop .5s ease forwards; }
  .slash svg { width:100%; height:auto; display:block; }
  @keyframes slashpop {
    0% { transform:translateX(-50%) rotate(-70deg) scale(.3); opacity:0; }
    25% { opacity:1; }
    100% { transform:translateX(-50%) rotate(45deg) scale(1.3); opacity:0; }
  }
  /* knight lunge + sword swing on the journey path */
  .knight.strike { animation:strikelunge .55s ease; }
  @keyframes strikelunge { 35% { transform:translateX(-50%) translateX(16px); } 60% { transform:translateX(-50%) translateX(10px); } }
  .knight.strike .k-arm, .knight.strike .b-arm { transform-box:fill-box; transform-origin:left bottom; animation:swing .55s ease; }
  .magic-ring { position:absolute; width:60px; height:60px; z-index:7; pointer-events:none;
    transform:translateX(-50%); border:4px solid #ffd94d; border-radius:50%;
    box-shadow:0 0 14px 4px rgba(255,217,77,.8), inset 0 0 10px 2px rgba(255,217,77,.6);
    animation:ringpop .55s ease forwards; }
  @keyframes ringpop { 0% { transform:translateX(-50%) scale(.15); opacity:1; } 100% { transform:translateX(-50%) scale(1.5); opacity:0; } }
  .goal { position:absolute; width:42px; z-index:3; animation:gpulse 1.6s infinite; }
  .goal svg { width:100%; height:auto; display:block; }
  @keyframes gpulse { 0%,100%{transform:translateX(-50%) scale(1);} 50%{transform:translateX(-50%) scale(1.08);} }

  /* ---------- dragon boss battle ---------- */
  .hp-row { position:absolute; top:6px; left:0; width:100%; text-align:center; z-index:6; }
  .hp-orb { font-size:20px; margin:0 2px; display:inline-block; }
  .hp-orb.lost { filter:grayscale(1); opacity:.3; }
  .boss-knight { position:absolute; left:11%; bottom:14px; width:60px; height:66px; z-index:5;
    filter:drop-shadow(0 3px 3px rgba(0,0,0,.4)); animation:kbob 2.4s ease-in-out infinite; }
  .boss-knight svg { width:100%; height:100%; display:block; }
  .boss-knight.attack { animation:bosscharge .9s ease; }
  @keyframes bosscharge {
    30%, 55% { transform:translateX(min(300px,52vw)); }
    42% { transform:translateX(min(300px,52vw)) translateY(-10px); }
  }
  .boss-knight.attack .k-leg-l { transform-box:fill-box; transform-origin:top center; animation:legL .9s ease; }
  .boss-knight.attack .k-leg-r { transform-box:fill-box; transform-origin:top center; animation:legR .9s ease; }
  .boss-knight.block { animation:shieldblock .9s ease; }
  @keyframes shieldblock { 25%, 70% { transform:translateX(-10px) rotate(-9deg); } }
  .boss-knight.block .k-shield { transform-box:fill-box; transform-origin:center; animation:shieldglow .9s ease; }
  @keyframes shieldglow { 30%, 65% { transform:scale(1.4); filter:drop-shadow(0 0 8px #ffd94d) brightness(1.6); } }
  .boss-dragon { position:absolute; right:5%; bottom:8px; width:118px; z-index:5;
    filter:drop-shadow(0 3px 4px rgba(0,0,0,.4)); animation:hover 3s ease-in-out infinite; }
  .boss-dragon svg { width:100%; height:auto; display:block; }
  .boss-dragon.hit { animation:dshake .7s ease; }
  @keyframes dshake { 18%{transform:translateX(30px) rotate(9deg) translateY(-8px);} 40%{transform:translateX(14px) rotate(-4deg);}
    62%{transform:translateX(20px) rotate(3deg);} 82%{transform:translateX(6px);} }
  .breath { position:absolute; right:23%; bottom:58px; width:54px; z-index:4; opacity:0; transition:opacity .25s; }
  .breath.on { opacity:1; }
  .breath svg { width:100%; height:auto; display:block; }

  /* dragon spell equation */
  .eq { display:flex; gap:10px; align-items:center; justify-content:center; flex-wrap:wrap; }
  .eq .chip {
    min-width:min(70px,16vw); height:min(70px,16vw); padding:0 12px; border-radius:18px;
    display:flex; align-items:center; justify-content:center;
    font-size:clamp(24px,6vw,36px); font-weight:bold; color:#3d1f66;
    background:linear-gradient(180deg,#e8d5ff,#c9a8f0); border:3px solid #8a5fc0;
    box-shadow:inset 0 -5px 0 rgba(0,0,0,.08);
  }
  .eq .chip.missing { background:#fff; color:#e2544a; border:3px dashed #e2544a; animation:pulse 1.2s infinite; }
  .eq .eq-equals { font-size:clamp(28px,7vw,40px); font-weight:bold; color:#e8d5ff; text-shadow:0 2px 0 rgba(0,0,0,.25); }

  .instruction {
    background:rgba(255,255,255,.85); border-radius:18px; padding:8px 16px;
    font-size:clamp(15px,3.6vw,19px); text-align:center; max-width:660px;
    display:flex; align-items:center; gap:10px;
  }
  .speak-btn { border:none; background:#dff0ff; border-radius:50%; width:44px; height:44px; font-size:22px; cursor:pointer; flex-shrink:0; box-shadow:0 3px 0 #9cc4e4; }
  .speak-btn:active { transform:translateY(2px); box-shadow:0 1px 0 #9cc4e4; }

  #task-area { display:flex; flex-direction:column; align-items:center; gap:6px; margin:10px 0 4px; min-height:190px; justify-content:center; width:100%; }

  /* pyramid */
  .pyr-row { display:flex; gap:6px; justify-content:center; }
  .brick {
    width:min(88px,19vw); height:min(58px,13vw);
    display:flex; align-items:center; justify-content:center;
    font-size:clamp(20px,5vw,30px); font-weight:bold; color:#5c3a10;
    background:linear-gradient(180deg,#ffe1a8,#f0b860);
    border:3px solid #c98f3d; border-radius:12px;
    box-shadow:inset 0 -6px 0 rgba(0,0,0,.08);
  }
  .brick.missing {
    background:#fff; color:#e2544a; border:3px dashed #e2544a;
    animation:pulse 1.2s infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.07);} }

  /* snake */
  .snake { display:flex; align-items:center; flex-wrap:wrap; justify-content:center; gap:4px; row-gap:14px; }
  .snake .seg {
    width:min(68px,15vw); height:min(68px,15vw); border-radius:50%;
    background:linear-gradient(180deg,#b6e388,#7cc24e); border:3px solid #4e8a26;
    display:flex; align-items:center; justify-content:center;
    font-size:clamp(20px,5vw,28px); font-weight:bold; color:#274d10;
    box-shadow:inset 0 -5px 0 rgba(0,0,0,.1);
  }
  .snake .seg.head { background:linear-gradient(180deg,#8fd463,#59a82f); }
  .snake .seg.missing { background:#fff; color:#e2544a; border:3px dashed #e2544a; animation:pulse 1.2s infinite; }
  .snake .op {
    font-size:clamp(16px,4vw,22px); font-weight:bold; color:#2b3a55;
    background:#fffef5; border-radius:14px; padding:4px 10px; margin:0 2px;
    box-shadow:0 3px 0 rgba(74,111,165,.3);
  }
  .snake .arrow { font-size:18px; color:#4e8a26; }
  .snake-emoji { font-size:34px; margin-right:2px; }

  /* choices */
  .choices { display:flex; gap:16px; justify-content:center; margin-top:10px; flex-wrap:wrap; }
  .choice {
    font-family:inherit; font-size:clamp(26px,6vw,36px); font-weight:bold;
    width:min(110px,26vw); height:min(80px,19vw);
    border:none; border-radius:22px; cursor:pointer;
    background:linear-gradient(180deg,#9ad8ff,#4aa8e8); color:#083b63;
    box-shadow:0 6px 0 #2f7fb5, 0 10px 16px rgba(0,0,0,.15);
    transition:transform .1s;
  }
  .choice:active { transform:translateY(4px); box-shadow:0 2px 0 #2f7fb5; }
  .choice.wrong { background:#d9d9d9; color:#999; box-shadow:0 6px 0 #b5b5b5; animation:shake .4s; pointer-events:none; }
  .choice.hintglow { animation:glow 1s infinite; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);} }
  @keyframes glow { 0%,100%{box-shadow:0 6px 0 #2f7fb5,0 0 6px 3px #ffd94d;} 50%{box-shadow:0 6px 0 #2f7fb5,0 0 20px 10px #ffd94d;} }

  /* toast */
  #toast {
    position:fixed; top:38%; left:50%; transform:translate(-50%,-50%) scale(0);
    font-size:clamp(34px,8vw,56px); font-weight:800; color:#fff;
    text-shadow:0 3px 0 #3f9e3f, 0 6px 14px rgba(0,0,0,.3);
    pointer-events:none; z-index:50; white-space:nowrap;
  }
  #toast.show { animation:toastIn .9s ease; }
  @keyframes toastIn { 0%{transform:translate(-50%,-50%) scale(0);} 30%{transform:translate(-50%,-50%) scale(1.15);} 60%{transform:translate(-50%,-50%) scale(1);} 100%{transform:translate(-50%,-70%) scale(1); opacity:0;} }

  .fly-gem { position:fixed; z-index:60; font-size:30px; pointer-events:none;
    transform:translate(-50%,-50%); transition:left .7s ease-in, top .7s ease-in, opacity .7s, font-size .7s; }

  /* overlay (story / medal / final) */
  #overlay {
    position:fixed; inset:0; background:rgba(30,45,80,.55); z-index:100;
    display:none; align-items:center; justify-content:center; padding:20px;
  }
  #overlay.show { display:flex; }
  .panel {
    background:#fffef5; border-radius:28px; padding:28px 26px; max-width:480px;
    text-align:center; box-shadow:0 16px 40px rgba(0,0,0,.35);
    animation:panelIn .35s ease;
  }
  @keyframes panelIn { from{transform:scale(.7); opacity:0;} to{transform:scale(1); opacity:1;} }
  .panel .big-emoji { font-size:66px; }
  .panel h3 { font-size:26px; margin:8px 0; }
  .panel p { font-size:18px; line-height:1.45; margin-bottom:16px; }

  .confetti-piece { position:fixed; top:-40px; font-size:26px; z-index:99; animation:fall linear forwards; pointer-events:none; }
  @keyframes fall { to { transform:translateY(110vh) rotate(720deg); } }

  /* ---------- character part animations ---------- */
  .wing { transform-origin:60px 40px; animation:flap 1.6s ease-in-out infinite; }
  @keyframes flap { 50% { transform:rotate(-14deg); } }
  .d-tail { transform-box:fill-box; transform-origin:left center; animation:tailsway 3s ease-in-out infinite; }
  @keyframes tailsway { 50% { transform:rotate(-9deg); } }
  .d-lid { opacity:0; animation:blink 4.2s infinite; }
  @keyframes blink { 0%,90%,100%{opacity:0;} 93%,97%{opacity:1;} }
  .k-cape { transform-box:fill-box; transform-origin:top right; animation:flutter 2.4s ease-in-out infinite; }
  @keyframes flutter { 50% { transform:rotate(7deg) scaleX(1.08); } }
  .knight.hop .k-leg-l { transform-box:fill-box; transform-origin:top center; animation:legL .7s ease; }
  .knight.hop .k-leg-r { transform-box:fill-box; transform-origin:top center; animation:legR .7s ease; }
  @keyframes legL { 30% { transform:rotate(-28deg); } 70% { transform:rotate(18deg); } }
  @keyframes legR { 30% { transform:rotate(24deg); } 70% { transform:rotate(-20deg); } }
  .boss-knight.attack .k-arm { transform-box:fill-box; transform-origin:left bottom; animation:swing .9s ease; }
  @keyframes swing { 40% { transform:rotate(-60deg); } 60% { transform:rotate(10deg); } }

  /* obstacle idle animations (inner svg, so knockout/blastout on the wrapper still works) */
  .a-troll svg { animation:stomp 1.8s ease-in-out infinite; }
  @keyframes stomp { 25% { transform:translateY(-4px) rotate(-2deg); } 75% { transform:translateY(-4px) rotate(2deg); } }
  .a-eagle svg { animation:eaglehover 1.3s ease-in-out infinite; }
  @keyframes eaglehover { 50% { transform:translateY(-6px); } }
  .a-croc svg { animation:crocrock 2.4s ease-in-out infinite; }
  @keyframes crocrock { 50% { transform:rotate(3deg) translateX(2px); } }
  .a-river svg { animation:riverbob 2s ease-in-out infinite; }
  @keyframes riverbob { 50% { transform:translateY(2px) scaleX(1.03); } }
  .a-spider svg { animation:spiderbob 2.2s ease-in-out infinite; }
  @keyframes spiderbob { 50% { transform:translateY(5px); } }

  /* ---------- gnome lake (boat) world ---------- */
  .bus-row { display:flex; align-items:center; flex-wrap:wrap; justify-content:center; gap:6px; row-gap:14px; }
  .bus-row .arrow { font-size:clamp(18px,4.5vw,26px); font-weight:bold; color:#2f7fb5; }
  .bus-chip {
    min-width:min(74px,17vw); height:min(64px,15vw); padding:0 12px; border-radius:16px;
    display:flex; align-items:center; justify-content:center; white-space:nowrap;
    font-size:clamp(18px,4.6vw,26px); font-weight:bold; color:#083b63;
    background:linear-gradient(180deg,#bfe4ff,#7cc0ee); border:3px solid #3a86bd;
    box-shadow:inset 0 -5px 0 rgba(0,0,0,.08);
  }
  .bus-chip.missing { background:#fff; color:#e2544a; border:3px dashed #e2544a; }
  .knight.as-boat { width:86px; height:62px; animation:boatrock 2.8s ease-in-out infinite; }
  @keyframes boatrock { 0%,100% { transform:translateX(-50%) rotate(-2deg); } 50% { transform:translateX(-50%) rotate(2.5deg) translateY(-3px); } }
  .knight.as-boat.hop { animation:boathop .7s ease; }
  @keyframes boathop { 50% { transform:translateX(-50%) translateY(-14px) rotate(4deg); } }
  .knight.as-boat.strike { animation:boatsurge .55s ease; }
  @keyframes boatsurge { 35% { transform:translateX(-50%) translateX(18px) rotate(3deg); } 60% { transform:translateX(-50%) translateX(12px); } }
  .sail { transform-box:fill-box; transform-origin:left center; animation:sailflutter 2.4s ease-in-out infinite; }
  @keyframes sailflutter { 50% { transform:scaleX(.94) skewY(-2deg); } }
  .a-octo svg { animation:spiderbob 2.4s ease-in-out infinite; }
  .a-whirl svg { animation:whirlspin 2.6s linear infinite; }
  @keyframes whirlspin { to { transform:rotate(360deg); } }

  .scene.bus .stone { background:rgba(235,248,255,.55); }

  #ov-text { white-space:pre-line; }

  /* task entrance + answer reveal */
  @keyframes appear { from { transform:scale(0); opacity:0; } to { transform:scale(1); opacity:1; } }

  .choice { animation:appear .3s ease backwards; }
  .solved {
    background:linear-gradient(180deg,#b6f0a0,#6fce58) !important;
    color:#1e5c12 !important; border:3px solid #3f9e3f !important;
    animation:solvedPop .5s ease !important;
  }
  @keyframes solvedPop { 0%{transform:scale(1);} 40%{transform:scale(1.3);} 100%{transform:scale(1);} }

  /* hit effects (journey fights + boss battle) */
  .spark { position:absolute; width:46px; z-index:7; pointer-events:none;
    transform:translateX(-50%); animation:sparkpop .55s ease forwards; }
  .spark svg { width:100%; height:auto; display:block; }

  .hp-orb.just-lost { animation:orbout .5s ease; }

  /* map nodes pop in */
  .map-node { animation:appear .4s ease backwards; }
  .map-node:nth-of-type(1) { animation-delay:.05s; }
  .map-node:nth-of-type(2) { animation-delay:.16s; }
  .map-node:nth-of-type(3) { animation-delay:.27s; }
  .map-node:nth-of-type(4) { animation-delay:.38s; }

  /* map hud row */
  .map-hud { display:flex; gap:10px; align-items:center; margin-bottom:14px; flex-wrap:wrap; justify-content:center; }
  .map-hud .gem-total { margin-bottom:0; }
  .shard-chip { display:flex; align-items:center; gap:6px; }
  .shard-chip svg { height:26px; width:auto; vertical-align:middle; }
  .stats-btn { font-size:16px; padding:5px 12px; }

  /* parallax background layer */
  .bg-layer { position:absolute; inset:0; width:calc(100% + 48px); height:100%; transition:transform .7s ease; }
  .bg-layer .scene-bg { width:100%; height:100%; }

  /* ambient particles */
  .amb { position:absolute; top:-16px; font-size:13px; opacity:.85; pointer-events:none; z-index:2;
    animation:ambfall linear infinite; }
  @keyframes ambfall { from { transform:translateY(0) rotate(0deg); } to { transform:translateY(170px) rotate(220deg); } }
  .amb.amb-rise { top:auto; bottom:-4px; animation:ambrise linear infinite; }
  @keyframes ambrise { from { transform:translateY(0); opacity:.9; } to { transform:translateY(-160px); opacity:0; } }

  /* dragon speech bubble */
  .bubble {
    position:absolute; top:24px; right:4%; max-width:190px; z-index:8;
    background:#fffef5; border:2px solid #8a5fc0; border-radius:14px;
    padding:6px 12px; font-size:14px; font-weight:bold; color:#3d1f66;
    box-shadow:0 4px 10px rgba(0,0,0,.3);
    animation:bubblelife 2s ease forwards;
  }
  .bubble::after { content:''; position:absolute; bottom:-9px; right:26px;
    border:5px solid transparent; border-top-color:#8a5fc0; }
  @keyframes bubblelife { 0%{transform:scale(0); opacity:0;} 12%{transform:scale(1.06); opacity:1;} 18%{transform:scale(1);} 85%{opacity:1;} 100%{opacity:0;} }

  /* owl hint bubble */
  .hint-bubble {
    background:#fffef5; border:3px solid #ffd94d; border-radius:16px;
    padding:8px 16px; font-size:clamp(14px,3.4vw,17px); font-weight:bold; color:#5c4a10;
    max-width:560px; animation:appear .3s ease; box-shadow:0 4px 10px rgba(0,0,0,.15);
  }

  /* dragon fatigue + defeat */
  .smoke { position:absolute; right:24%; bottom:70px; font-size:18px; z-index:4; opacity:.8;
    animation:ambrise 2.4s linear infinite; }
  .boss-dragon.tired { animation:tiredhover 4s ease-in-out infinite; }
  @keyframes tiredhover { 0%,100% { transform:translateY(4px) rotate(4deg); } 50% { transform:translateY(8px) rotate(5deg); } }
  .boss-dragon.defeated { animation:dragonout 1.3s ease forwards !important; }
  @keyframes dragonout {
    25% { transform:translateY(-24px) rotate(-25deg); opacity:1; }
    100% { transform:translateY(-190px) rotate(360deg) scale(.5); opacity:0; }
  }
  .scene.shake { animation:shake .4s; }

  /* story stage in overlay panel */
  #ov-stage { display:none; margin:0 auto 8px; }
  #ov-stage svg { height:120px; width:auto; max-width:100%; display:block; margin:0 auto;
    filter:drop-shadow(0 6px 8px rgba(0,0,0,.2)); animation:appear .4s ease; }
</style>

/* ================= state ================= */
const DEFAULT_STATE = {
  gems:{pyr:0, had:0, bus:0},
  level:{pyr:1, had:1, bus:1},
  streak:{pyr:0, had:0, bus:0},
  failStreak:{pyr:0, had:0, bus:0},
  medalsShown:{pyr:0, had:0, bus:0},
  worldIntro:{pyr:false, had:false, bus:false},
  stats:{
    pyr:{solved:0, firstTry:0, misses:0, maxLevel:1},
    had:{solved:0, firstTry:0, misses:0, maxLevel:1},
    bus:{solved:0, firstTry:0, misses:0, maxLevel:1},
    drak:{solved:0, firstTry:0, misses:0, wins:0}
  },
  introSeen:false,
  dragonBeaten:false
};
let S = loadState();
function loadState(){
  const st = JSON.parse(JSON.stringify(DEFAULT_STATE));
  try {
    const raw = localStorage.getItem('rytirCisel');
    if (raw){
      const saved = JSON.parse(raw);
      // deep-merge one level so saves from older versions keep their
      // progress but gain the new worlds' default keys
      for (const k of Object.keys(st)){
        if (saved[k] === undefined) continue;
        if (st[k] && typeof st[k] === 'object'){
          for (const k2 of Object.keys(saved[k]||{})){
            if (st[k][k2] && typeof st[k][k2] === 'object') Object.assign(st[k][k2], saved[k][k2]);
            else st[k][k2] = saved[k][k2];
          }
        } else st[k] = saved[k];
      }
    }
  } catch(e){}
  return st;
}
function saveState(){ try { localStorage.setItem('rytirCisel', JSON.stringify(S)); } catch(e){} }
function resetProgress(){
  if (confirm('Opravdu smazat všechen postup?')) {
    S = JSON.parse(JSON.stringify(DEFAULT_STATE));
    saveState();
    alert('Postup byl smazán.');
  }
}

/* ================= helpers ================= */
function randInt(a,b){ return a + Math.floor(Math.random()*(b-a+1)); }
function pick(arr){ return arr[randInt(0,arr.length-1)]; }
function shuffle(arr){
  for (let i=arr.length-1; i>0; i--){ const j=randInt(0,i); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}
function makeChoices(ans){
  const set = new Set([ans]);
  let guard = 0;
  while (set.size < 3 && guard++ < 100){
    const d = ans + (Math.random()<0.5?-1:1)*randInt(1,3);
    if (d >= 0) set.add(d);
  }
  while (set.size < 3) set.add(ans + set.size);
  return shuffle([...set]);
}

/* ================= audio ================= */
let AC = null;
function ensureAudio(){
  if (!AC) { try { AC = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} }
  if (AC && AC.state === 'suspended') AC.resume();
}
function tone(freq, when, dur, type, vol){
  if (!AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type||'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(vol||0.15, AC.currentTime + when);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + when + dur);
  o.connect(g); g.connect(AC.destination);
  o.start(AC.currentTime + when); o.stop(AC.currentTime + when + dur + 0.05);
}
function playCorrect(){ tone(523,0,.15); tone(659,.13,.15); tone(784,.26,.3); }
function playStep(){ tone(440,0,.08,'triangle',.08); tone(554,.1,.1,'triangle',.08); }
function playFlee(){ tone(880,0,.1); tone(740,.1,.1); tone(587,.2,.1); tone(440,.3,.2); }
function playWrong(){ tone(196,0,.3,'triangle',.12); }
function playHit(){ tone(1200,0,.07,'triangle',.1); tone(170,.04,.14,'square',.14); tone(90,.1,.2,'sawtooth',.1); }
function playMagic(){ tone(523,0,.09,'sine',.1); tone(659,.08,.09,'sine',.1); tone(880,.16,.12,'sine',.1); tone(1175,.24,.28,'sine',.12); }
function playRoar(){ tone(300,0,.15,'sawtooth',.1); tone(220,.12,.2,'sawtooth',.1); tone(150,.28,.35,'sawtooth',.09); }
function playClick(){ tone(600,0,.06,'square',.05); }
function playFanfare(){ tone(523,0,.18); tone(659,.15,.18); tone(784,.3,.18); tone(1047,.45,.5); }

/* ================= speech ================= */
function speak(text){
  try {
    if (!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'cs-CZ'; u.rate = 0.92;
    const v = speechSynthesis.getVoices().find(v => v.lang && v.lang.toLowerCase().startsWith('cs'));
    if (v) u.voice = v;
    speechSynthesis.speak(u);
  } catch(e){}
}
if ('speechSynthesis' in window) speechSynthesis.getVoices();

function showStory(panels, onDone){
  let i = 0;
  const next = () => {
    const p = panels[i];
    const last = i === panels.length - 1;
    showPanel('', p.title, p.text, last ? (p.btn || 'Pokračovat') : 'Dál ➜', () => {
      i++;
      if (i < panels.length) next();
      else if (onDone) onDone();
    }, true, p.stage);
  };
  next();
}
function startGame(){
  ensureAudio(); playClick();
  if (!S.introSeen){
    showStory(INTRO_STORY, () => { S.introSeen = true; saveState(); goMap(); });
  } else goMap();
}
function towerUnlocked(){
  return S.dragonBeaten || shardCount() === 3;
}
function goMap(){
  playClick();
  document.getElementById('total-gems').textContent = S.gems.pyr + S.gems.had + S.gems.bus;
  const sv = document.getElementById('shard-view');
  if (sv) sv.innerHTML = crystalSVG(shardCount());
  for (const w of ['pyr','had','bus']){
    const medals = Math.floor(S.gems[w]/10);
    document.getElementById('medals-'+w).textContent = medals ? '🏅'.repeat(Math.min(medals,4)) + (medals>4?' ×'+medals:'') : '—';

  }
  const unlocked = towerUnlocked();
  document.getElementById('tower-card').classList.toggle('locked', !unlocked);
  document.getElementById('tower-status').textContent = unlocked ? (S.dragonBeaten ? '👑' : '⚔️') : '🔒';

      answer:sign, choices:['+','−'],

/* ================= task generation ================= */
function genPyramid(level){
  const cfg = [null,
    {base:2, maxB:9, missing:['top']},
    {base:2, maxB:9, missing:['base']},
    {base:3, maxB:6, missing:['top','mid']},
    {base:3, maxB:6, missing:['base','mid']},
    {base:4, maxB:3, missing:['base','mid','top']}
  ][level];
  let base;
  do { base = Array.from({length:cfg.base}, () => randInt(0, cfg.maxB)); }
  while (base.reduce((a,b)=>a+b,0) < 3);
  const rows = [base];
  while (rows[rows.length-1].length > 1){
    const prev = rows[rows.length-1];
    rows.push(prev.slice(1).map((v,i) => v + prev[i]));
  }
  const type = pick(cfg.missing);
  let mr, mi;
  if (type === 'top'){ mr = rows.length-1; mi = 0; }
  else if (type === 'base'){ mr = 0; mi = randInt(0, rows[0].length-1); }
  else { mr = randInt(1, rows.length-2); mi = randInt(0, rows[mr].length-1); }
  const hint = (mr === rows.length-1)
    ? 'Sečti dvě cihly hned pod otazníkem.'
    : 'Otazník a cihla vedle něj dají dohromady cihlu nad nimi.';
  return { kind:'pyr', rows, mr, mi, answer: rows[mr][mi], hint };
}

function genSnake(level){
  const cfg = [null,
    {len:3, max:10, step:5, blank:'last'},
    {len:4, max:10, step:5, blank:'mid'},
    {len:4, max:20, step:7, blank:'midlast'},
    {len:5, max:20, step:7, blank:'any'},
    {len:5, max:20, step:9, blank:'firstmid'}
  ][level];
  const vals = [randInt(0, cfg.max)];
  const ops = [];
  for (let i=1; i<cfg.len; i++){
    let k, sign, next, tries = 0;
    do {
      k = randInt(1, cfg.step);
      sign = Math.random() < 0.5 ? -1 : 1;
      next = vals[i-1] + sign*k;
      tries++;
    } while ((next < 0 || next > cfg.max) && tries < 60);
    if (next < 0 || next > cfg.max){ sign = next < 0 ? 1 : -1; next = vals[i-1] + sign*k; }
    ops.push(sign*k);
    vals.push(next);
  }
  let bi;
  switch (cfg.blank){
    case 'last':     bi = cfg.len-1; break;
    case 'mid':      bi = randInt(1, cfg.len-2); break;
    case 'midlast':  bi = randInt(1, cfg.len-1); break;
    case 'any':      bi = randInt(0, cfg.len-1); break;
    case 'firstmid': bi = Math.random() < 0.4 ? 0 : randInt(1, cfg.len-2); break;
  }
  const hint = bi === 0
    ? 'Počítej pozpátku: udělej opačný krok, než říká první šipka.'
    : 'Vezmi číslo před otazníkem a udělej krok, který říká šipka.';
  return { kind:'had', vals, ops, bi, answer: vals[bi], hint };
}

function genBus(level){
  const cfg = [null,
    {stops:1, max:10, blank:['end']},
    {stops:2, max:10, blank:['end']},
    {stops:2, max:20, blank:['end']},
    {stops:3, max:20, blank:['end','op']},
    {stops:3, max:20, blank:['end','op','start']}
  ][level];
  const vals = [randInt(1, Math.min(9, cfg.max-1))];
  const ops = [];
  for (let i=0; i<cfg.stops; i++){
    let k, sign, next, tries = 0;
    do {
      k = randInt(1, 6);
      sign = Math.random() < 0.5 ? -1 : 1;
      next = vals[i] + sign*k;
      tries++;
    } while ((next < 0 || next > cfg.max) && tries < 60);
    if (next < 0 || next > cfg.max){ sign = next < 0 ? 1 : -1; next = vals[i] + sign*k; }
    ops.push(sign*k);
    vals.push(next);
  }
  const blank = pick(cfg.blank);
  let missIdx, answer, revealPrefix = '', revealSuffix = '';
  if (blank === 'end'){ missIdx = cfg.stops+1; answer = vals[vals.length-1]; }
  else if (blank === 'start'){ missIdx = 0; answer = vals[0]; revealPrefix = '⛵ '; }
  else {
    const oi = randInt(0, cfg.stops-1);
    missIdx = 1+oi; answer = Math.abs(ops[oi]);
    revealPrefix = (ops[oi] >= 0 ? '+' : '−'); revealSuffix = ' 🧝';
  }
  const hint = blank === 'end' ? 'Počítej od začátku: na každém molu přičti nebo odečti.'
    : blank === 'start' ? 'Počítej pozpátku od konce plavby.'
    : 'Porovnej počet skřítků před molem a po něm.';
  return { kind:'bus', vals, ops, missIdx, answer, revealPrefix, revealSuffix, hint };
}

/* ================= rendering ================= */
function newTask(){
  missesThisTask = 0;
  inputLocked = false;
  hideHintBubble();
  if (currentWorld === 'drak'){
    currentTask = genDragon(BOSS_MAX - bossHP);
    renderBossHud();
    renderBossScene();
    renderTask();
    renderChoices();
    return;
  }
  currentTask = currentWorld === 'pyr' ? genPyramid(S.level.pyr)
              : currentWorld === 'had' ? genSnake(S.level.had)
              : genBus(S.level.bus);
  renderGems();
  renderScene();
  renderTask();
  renderChoices();
}
function renderTask(){
  const area = document.getElementById('task-area');
  area.innerHTML = '';
  const t = currentTask;
  let delay = 0;
  const stagger = (node) => { node.style.animationDelay = delay + 'ms'; delay += 55; return node; };
  if (t.kind === 'drak'){
    const eq = document.createElement('div');
    eq.className = 'eq';
    t.eq.forEach((v,i) => {
      const ch = document.createElement('div');
      if (v === '='){ ch.className = 'eq-equals'; ch.textContent = '='; }
      else if (i === t.missIdx){ ch.className = 'chip missing'; ch.id = 'miss-slot'; ch.textContent = '?'; }
      else { ch.className = 'chip'; ch.textContent = v; }
      eq.appendChild(stagger(ch));
    });
    area.appendChild(eq);
    return;
  }
  if (t.kind === 'bus'){
    const row = document.createElement('div');
    row.className = 'bus-row';
    const total = t.ops.length + 2;
    for (let i=0; i<total; i++){
      if (i > 0){
        const ar = document.createElement('span');
        ar.className = 'arrow';
        ar.textContent = (i === total-1) ? '=' : '➜';
        row.appendChild(stagger(ar));
      }
      const ch = document.createElement('div');
      const isMissing = i === t.missIdx;
      ch.className = 'bus-chip' + (isMissing ? ' missing' : '');
      if (isMissing){
        ch.id = 'miss-slot';
        ch.textContent = i === 0 ? '⛵ ?' : (i === total-1 ? '?' : (t.ops[i-1] >= 0 ? '+' : '−') + '?');
      }
      else if (i === 0) ch.textContent = '⛵ ' + t.vals[0];
      else if (i === total-1) ch.textContent = t.vals[t.vals.length-1];
      else ch.textContent = (t.ops[i-1] >= 0 ? '+' : '−') + Math.abs(t.ops[i-1]) + ' 🧝';
      row.appendChild(stagger(ch));
    }
    area.appendChild(row);
    return;
  }
  if (t.kind === 'pyr'){
    for (let r = t.rows.length-1; r >= 0; r--){
      const row = document.createElement('div');
      row.className = 'pyr-row';
      t.rows[r].forEach((v,i) => {
        const b = document.createElement('div');
        const isMissing = (r === t.mr && i === t.mi);
        b.className = 'brick' + (isMissing ? ' missing' : '');
        if (isMissing) b.id = 'miss-slot';
        b.textContent = isMissing ? '?' : v;
        row.appendChild(stagger(b));
      });
      area.appendChild(row);
    }
  } else {
    const snake = document.createElement('div');
    snake.className = 'snake';
    const head = document.createElement('span');
    head.className = 'snake-emoji';
    head.textContent = '🐍';
    snake.appendChild(stagger(head));
    t.vals.forEach((v,i) => {
      const seg = document.createElement('div');
      const isMissing = i === t.bi;
      seg.className = 'seg' + (i === 0 ? ' head' : '') + (isMissing ? ' missing' : '');
      if (isMissing) seg.id = 'miss-slot';
      seg.textContent = isMissing ? '?' : v;
      snake.appendChild(stagger(seg));
      if (i < t.ops.length){
        const arrow = document.createElement('span');
        arrow.className = 'arrow';
        arrow.textContent = '➜';
        const op = document.createElement('span');
        op.className = 'op';
        op.textContent = (t.ops[i] >= 0 ? '+' : '−') + Math.abs(t.ops[i]);
        snake.appendChild(stagger(arrow));
        snake.appendChild(stagger(op));
      }
    });
    area.appendChild(snake);
  }
}
function renderChoices(){
  const box = document.getElementById('choices');
  box.innerHTML = '';
  const opts = currentTask.choices ? shuffle([...currentTask.choices]) : makeChoices(currentTask.answer);
  opts.forEach((v,i) => {
    const b = document.createElement('button');
    b.className = 'choice';
    b.style.animationDelay = (200 + i*80) + 'ms';
    b.textContent = v;
    b.onclick = () => answer(b, v);
    box.appendChild(b);
  });
}

/* ================= answering ================= */
const PRAISE = ['Výborně!','Skvěle!','Paráda!','Super!','Přesně tak!','Jsi kouzelník!'];
function answer(btn, val){
  if (inputLocked) return;
  ensureAudio();
  const w = currentWorld;
  if (val === currentTask.answer){
    revealAnswer(val);
    const st = S.stats[w];
    if (st){ st.solved++; if (missesThisTask === 0) st.firstTry++; }
    if (w === 'drak'){
      playCorrect();
      bossHit();
      return;
    }
    inputLocked = true;
    playCorrect();
    flyGem();
    toast(pick(PRAISE));
    S.gems[w]++;
    if (missesThisTask >= 2){ S.failStreak[w]++; }
    else if (missesThisTask === 0){
      S.failStreak[w] = 0;
      S.streak[w]++;
      if (S.streak[w] >= 3 && S.level[w] < 5){
        S.level[w]++;
        S.streak[w] = 0;
        if (S.stats[w]) S.stats[w].maxLevel = Math.max(S.stats[w].maxLevel, S.level[w]);
        setTimeout(() => toast('✨ Nové kouzlo! Úroveň ' + S.level[w]), 1000);
      }
    } else {
      S.failStreak[w] = 0;
      S.streak[w] = 0;
    }
    if (S.failStreak[w] >= 2 && S.level[w] > 1){
      S.level[w]--;
      S.failStreak[w] = 0;
      S.streak[w] = 0;
    }
    saveState();
    renderGems();
    const gotMedal = S.gems[w] % 10 === 0 && Math.floor(S.gems[w]/10) > S.medalsShown[w];
    const newPos = gotMedal ? 10 : S.gems[w] % 10;
    const extraDelay = moveKnight(newPos);
    setTimeout(() => {
      if (gotMedal){
        const firstMedal = Math.floor(S.gems[w]/10) === 1;
        S.medalsShown[w] = Math.floor(S.gems[w]/10);
        saveState();
        playFanfare(); confetti();
        if (firstMedal){
          const shards = shardCount();
          const txt = WORLDS[w].goalStory + ' A našel jsi ' + shards + '. střep Křišťálu čísel!' +
            (shards === 3 ? ' Křišťál je zase celý — Dračí věž se otevřela!' : ' Další střep hledej v jiném světě.');
          showPanel('', 'Střep křišťálu!', txt, 'Pokračovat', newTask, true, crystalSVG(shards));
        } else {
          showPanel('🏅','Medaile!', WORLDS[w].goalStory + ' Drak Chaos se už třese strachy.',
            'Pokračovat', newTask, true);
        }
      } else newTask();
    }, 1300 + extraDelay);
  } else {
    playWrong();
    if (w === 'drak'){
      dragonBreath();
      const k = document.getElementById('boss-knight');
      if (k && k.classList){ k.classList.remove('block'); void k.offsetWidth; k.classList.add('block'); setTimeout(() => k.classList.remove('block'), 950); }
    }
    btn.classList.add('wrong');
    missesThisTask++;
    if (S.streak[w] !== undefined) S.streak[w] = 0;
    if (S.stats[w]) S.stats[w].misses++;
    if (missesThisTask >= 2){
      document.querySelectorAll('.choice:not(.wrong)').forEach(b => b.classList.add('hintglow'));
      showHintBubble(currentTask.hint);
      speak(currentTask.hint);
    } else {
      toast('Zkus to znovu!');
    }
  }
}
function revealAnswer(val){
  const ms = document.getElementById('miss-slot');
  if (!ms) return;
  ms.textContent = (currentTask.revealPrefix || '') + String(val) + (currentTask.revealSuffix || '');
  if (ms.classList) ms.classList.add('solved');
}
function showHintBubble(text){
  const hb = document.getElementById('hint-bubble');
  if (!hb) return;
  hb.textContent = '🦉 ' + text;
  hb.style.display = 'block';
}
function hideHintBubble(){
  const hb = document.getElementById('hint-bubble');
  if (hb) hb.style.display = 'none';
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('show');
  void t.offsetWidth;
  t.classList.add('show');
}
function flyGem(){
  if (typeof requestAnimationFrame === 'undefined') return;
  const area = document.getElementById('task-area'), bar = document.getElementById('gem-bar');
  if (!area || !bar || !area.getBoundingClientRect) return;
  const a = area.getBoundingClientRect(), b = bar.getBoundingClientRect();
  const g = document.createElement('div');
  g.className = 'fly-gem';
  g.textContent = '💎';
  g.style.left = (a.left + a.width/2) + 'px';
  g.style.top = (a.top + a.height/2) + 'px';
  document.body.appendChild(g);
  requestAnimationFrame(() => requestAnimationFrame(() => {
    g.style.left = (b.left + b.width/2) + 'px';
    g.style.top = (b.top + b.height/2) + 'px';
    g.style.fontSize = '14px';
    g.style.opacity = '.25';
  }));
  setTimeout(() => g.remove(), 800);
}
function confetti(){
  const emojis = ['🎉','⭐','💎','🎊','✨','🏅'];
  for (let i=0; i<36; i++){
    const p = document.createElement('span');
    p.className = 'confetti-piece';
    p.textContent = pick(emojis);
    p.style.left = randInt(2,96) + 'vw';
    p.style.animationDuration = (1.6 + Math.random()*1.6) + 's';
    p.style.animationDelay = (Math.random()*0.8) + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 4200);
  }
}

/* ================= boot ================= */
document.getElementById('hero-knight').innerHTML = KNIGHT_SVG;
document.getElementById('hero-dragon').innerHTML = DRAGON_SVG;
if ('serviceWorker' in navigator && location.protocol.startsWith('http')){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
