  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="120" cy="90" r="34" fill="#ffd94d"/>
  <polygon points="0,240 110,130 220,240" fill="#8fa8c4" opacity=".7"/>
